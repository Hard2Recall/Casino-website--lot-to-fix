<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plinko — Casino</title>
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0a1a 100%);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
    }
    .left-sidebar {
      width: 210px;
      padding: 18px 10px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: linear-gradient(180deg, rgba(255,215,0,0.07) 0%, rgba(255,215,0,0) 100%);
      border-right: 3px solid rgba(255,215,0,0.24);
      box-shadow: inset -6px 0 16px rgba(0,0,0,0.3), 5px 0 12px rgba(255,215,0,0.06);
    }
    .sidebar-balance, .sidebar-result, .sidebar-last-result {
      text-align: center;
      padding: 12px 8px;
      border-radius: 12px;
      margin-bottom: 5px;
    }
    .sidebar-balance {
      background: linear-gradient(135deg, rgba(0,255,0,0.10) 0%, rgba(0,255,0,0.02) 100%);
      border: 2px solid rgba(0,255,0,0.20);
      box-shadow: 0 4px 10px rgba(0,255,0,0.1), inset 0 1px 0 rgba(0,255,0,0.1);
    }
    .sidebar-balance p { font-size: 0.72em; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .sidebar-balance .amount {
      font-size: 1.7em; color: #00ff00; font-weight: 900;
      text-shadow: 0 0 12px rgba(0,255,0,0.45); letter-spacing: 1px; display: block;
    }
    .sidebar-result { min-height: 46px; font-size: 0.95em; padding: 8px 5px; }
    .sidebar-result.win { background: linear-gradient(135deg, rgba(0,255,0,0.13) 0%, rgba(0,255,0,0.05) 100%); border: 2px solid rgba(0,255,0,0.31); color: #00ff00; }
    .sidebar-result.lose { background: linear-gradient(135deg, rgba(255,85,85,0.13) 0%, rgba(255,85,85,0.05) 100%); border: 2px solid rgba(255,85,85,0.31); color: #ff5555; }
    .sidebar-result-text { font-size: 1em; font-weight: 700; margin-bottom: 2px; letter-spacing: 0.5px; text-transform: uppercase; }
    .sidebar-result-amount { font-size: 1em; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255,255,255,0.14); }
    .sidebar-last-result {
      border: 1.5px solid #ffd700;
      background: rgba(255,237,78,0.075);
      color: #ffd700;
      font-size: 0.96em;
      margin-top: 0;
    }
    #plinko-container {
      max-width: 950px;
      margin: 0 auto 0 0;
      padding: 15px 16px 11px 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .header-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px; padding: 10px 14px; background: linear-gradient(135deg, rgba(255,215,0,0.12) 0%, rgba(255,215,0,0.04) 100%);
      border: 2px solid rgba(255,215,0,0.18); border-radius: 9px; box-shadow: 0 3px 12px rgba(255,215,0,0.04);
    }
    .header-bar h1 {
      margin: 0; font-size: 1.55em;
      background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-weight: 900; letter-spacing: 1px;
    }
    .back-link { color: #aaa; text-decoration: none; font-size: 0.88em; padding: 4px 13px;
      border: 2px solid rgba(255,215,0,0.16); border-radius: 7px; transition: all 0.3s; }
    .back-link:hover { color: #ffd700; border-color: #ffd700; background: rgba(255,215,0,0.1);}
    .table {
      background: linear-gradient(135deg, #164d1a 0%, #20722c 100%);
      border: 3px solid #44aa44;
      border-radius: 19px;
      padding: 20px 9px 9px 9px;
      margin-bottom: 7px;
      box-shadow: 0 9px 20px rgba(0,0,0,0.24), inset 0 0 14px rgba(68,170,68,0.09);
      position: relative;
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 440px; max-height: 700px; height: 540px;
      justify-content: flex-start;
    }
    #game-area {
      width: 100%;
      display: flex;
      flex-direction: row;
      gap: 28px;
      align-items: flex-start;
      justify-content: center;
      margin-bottom: 10px;
      min-height: 420px;
    }
    #plinko-controls {
      min-width:245px; max-width:285px;
      display:flex; flex-direction:column; gap:11px;
      background: linear-gradient(135deg,rgba(255,215,0,0.08),rgba(0,0,0,0.02));
      border: 2px solid rgba(255,215,0,0.13);
      border-radius:10px; padding:13px 14px 10px 14px;
      font-size: 1em;
    }
    #plinko-controls label {
      color: #ffd700;
      font-weight: bold;
      font-size: 1em;
      margin-bottom: 2px;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
    }
    #plinko-controls input[type="number"] {
      padding: 7px 10px;
      font-size: 1em;
      border: 2px solid rgba(255,215,0,0.23);
      border-radius: 6px;
      background: #181d23;
      color: #fff;
      font-weight: bold;
      width: 92px;
      margin-left: 9px;
    }
    #plinko-controls select {
      padding: 7px 10px;
      font-size: 1em;
      border: 2px solid #ffd700;
      border-radius: 7px;
      background: #38495a;
      color: #fff;
      font-weight: bold;
      width: 110px;
      margin-left: 9px;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      box-shadow: none;
      outline: none;
    }
    #plinko-controls select option {
      background: #38495a;
      color: #fff;
    }
    #plinko-controls input:focus,
    #plinko-controls select:focus {
      outline: none;
      border-color: #ffd700;
      background: rgba(255,215,0,0.16);
      box-shadow: 0 0 8px rgba(255,215,0,0.13);
    }
    #plinko-controls button {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      font-size: 1em;
      font-weight: bold;
      letter-spacing: 0.8px;
      background: linear-gradient(135deg, #ffed4e 0%, #ffd700 100%);
      color: #181818;
      margin-top: 2px;
      cursor: pointer;
      transition: filter .2s, box-shadow .2s;
      min-width: 90px;
    }
    #plinko-controls button:active { filter: brightness(0.96);}
    #quick { background: linear-gradient(135deg, #00d960 0%, #00b84d 100%); color: #fff; }
    #quick:hover { background: linear-gradient(135deg,#00ff6b 0%,#00d960 100%);}
    #drop:hover { box-shadow: 0 4px 16px rgba(255,239,78,0.16);}
    .muted { color: #9aa4b2; font-size: 1.04em;}
    #plinko-canvas {
      background:linear-gradient(#04111a,#071018);
      border-radius:12px;display:block;margin-top:4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.32);
      width: 380px;
      height: 460px;
      min-width: 260px;
      min-height: 280px;
      max-width: 640px;
      max-height: 700px;
    }
    #multipliers {display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
    #multipliers div {
      padding:8px 13px; background:rgba(255,255,255,0.03); border-radius:8px;
      font-size:15px;
    }
    #plinko-log { margin-top:11px; font-size:1.09em; }
    footer { margin-top:20px; text-align:center; color:#9aa4b2; }
    @media (max-width: 1100px) {.left-sidebar {display:none !important;}}
    @media (max-width: 700px) {#plinko-controls{max-width:100vw;}}
  </style>
</head>
<body>
  <div class="left-sidebar">
    <div class="sidebar-balance">
      <p>💰 Balance</p>
      <div class="amount" id="sidebar-bankroll">$0</div>
    </div>
    <div class="sidebar-last-result" id="sidebar-last-result">
      <div style="font-size:0.93em;font-weight:bold;">🎯 Last Result</div>
      <div style="font-size:0.99em;margin-top:2px;" id="sidebar-last-result-txt">-</div>
    </div>
    <div class="sidebar-result" id="sidebar-result">
      <div class="sidebar-result-text" id="sidebar-result-text">Result</div>
      <div class="sidebar-result-amount" id="sidebar-result-amount">$0</div>
    </div>
  </div>
  <div id="plinko-container">
    <span id="bankroll" style="display:none"></span>
    <div class="header-bar">
      <h1>🎰 PLINKO</h1>
      <a href="../../index.html" class="back-link">← Back</a>
    </div>
    <div class="table">
      <section id="game-area">
        <div>
          <p class="muted" style="margin-bottom:7px;">Configure Plinko round.</p>
          <div id="plinko-controls">
            <label>Bet Amount: <input id="bet" type="number" min="1" value="10"></label>
            <label>Risk Level:
              <select id="risk">
                <option value="low">Low (safer)</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High (edgier)</option>
              </select>
            </label>
            <label>Rows: <input id="rows" type="number" min="8" max="10" value="10" /></label>
            <div style="display:flex;gap:9px;margin-bottom:3px;">
              <button id="drop">Drop Ball</button>
              <button id="quick" title="Quick demo">Quick</button>
            </div>
            <div>
              <div><strong>Potential (slot multipliers):</strong></div>
              <div id="multipliers"></div>
            </div>
          </div>
        </div>
        <div>
          <canvas id="plinko-canvas" width="380" height="460"></canvas>
        </div>
      </section>
      <div id="plinko-log"></div>
    </div>
    <footer><small>Prototype — game logic will be implemented on request.</small></footer>
  </div>
  <script>
    // Prevent more than 10 rows!
    document.addEventListener("DOMContentLoaded", function() {
      const rowInput = document.getElementById("rows");
      rowInput.addEventListener("change", function() {
        if(+rowInput.value > 10) rowInput.value = 10;
        if(+rowInput.value < 8) rowInput.value = 8;
      });
    });

    // Sidebar sync logic
    function syncSidebar() {
      var bankroll = document.getElementById('bankroll')?.textContent || '$0';
      document.getElementById('sidebar-bankroll').textContent = bankroll;
      var last = document.getElementById('last-result')?.textContent || '-';
      document.getElementById('sidebar-last-result-txt').textContent = last;
      // Result (extract won $)
      var logEl = document.getElementById('plinko-log');
      var res = "-";
      if(logEl && logEl.textContent.match(/won\s+\$?([\d.]+)/i)){
        res = logEl.textContent.match(/won\s+\$?([\d.]+)/i)[1];
      }
      document.getElementById('sidebar-result-amount').textContent = res === "-" ? "-" : "$"+res;
      document.getElementById('sidebar-result-text').textContent = res === "-" ? "RESULT" : ("WIN!");
      var box = document.getElementById('sidebar-result');
      box.className = "sidebar-result" + ((res !== "-" && +res>0) ? " win" : (res==="-" ? "" : " lose"));
    }
    setInterval(syncSidebar, 280);
  </script>
  <script src="main.js"></script>
</body>
</html>
