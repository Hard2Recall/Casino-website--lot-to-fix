<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mines — Casino</title>
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0a1a 100%);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
    }
    .left-sidebar {
      width: 210px;
      padding: 18px 10px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: linear-gradient(180deg, rgba(255,215,0,0.07) 0%, rgba(255,215,0,0) 100%);
      border-right: 3px solid rgba(255,215,0,0.24);
      box-shadow: inset -6px 0 16px rgba(0,0,0,0.3), 5px 0 12px rgba(255,215,0,0.06);
    }
    .sidebar-balance, .sidebar-result, .sidebar-last-mult {
      text-align: center;
      padding: 12px 8px;
      border-radius: 12px;
      margin-bottom: 5px;
    }
    .sidebar-balance {
      background: linear-gradient(135deg, rgba(0,255,0,0.10) 0%, rgba(0,255,0,0.02) 100%);
      border: 2px solid rgba(0,255,0,0.20);
      box-shadow: 0 4px 10px rgba(0,255,0,0.1), inset 0 1px 0 rgba(0,255,0,0.1);
    }
    .sidebar-balance p { font-size: 0.72em; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .sidebar-balance .amount {
      font-size: 1.7em; color: #00ff00; font-weight: 900;
      text-shadow: 0 0 12px rgba(0,255,0,0.45); letter-spacing: 1px; display: block;
    }
    .sidebar-result { min-height: 46px; font-size: 0.95em; padding: 8px 5px; }
    .sidebar-result.win { background: linear-gradient(135deg, rgba(0,255,0,0.13) 0%, rgba(0,255,0,0.05) 100%); border: 2px solid rgba(0,255,0,0.31); color: #00ff00; }
    .sidebar-result.lose { background: linear-gradient(135deg, rgba(255,85,85,0.13) 0%, rgba(255,85,85,0.05) 100%); border: 2px solid rgba(255,85,85,0.31); color: #ff5555; }
    .sidebar-result-text { font-size: 1em; font-weight: 700; margin-bottom: 2px; letter-spacing: 0.5px; text-transform: uppercase; }
    .sidebar-result-amount { font-size: 1em; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255,255,255,0.14); }
    .sidebar-last-mult {
      border: 1.5px solid #ffd700;
      background: rgba(255,237,78,0.075);
      color: #ffd700;
      font-size: 0.96em;
      margin-top: 0;
    }
    #mines-container {
      max-width: 950px;
      margin: 0 auto 0 0;
      padding: 18px 18px 13px 18px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .header-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; padding: 12px 19px; background: linear-gradient(135deg, rgba(255,215,0,0.12) 0%, rgba(255,215,0,0.04) 100%);
      border: 2px solid rgba(255,215,0,0.18); border-radius: 12px; box-shadow: 0 3px 12px rgba(255,215,0,0.04);
    }
    .header-bar h1 {
      margin: 0; font-size: 1.44em;
      background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-weight: 900; letter-spacing: 1px;
    }
    .back-link { color: #aaa; text-decoration: none; font-size: 0.93em; padding: 6px 15px;
      border: 2px solid rgba(255,215,0,0.16); border-radius: 8px; transition: all 0.3s; }
    .back-link:hover { color: #ffd700; border-color: #ffd700; background: rgba(255,215,0,0.1);}
    .table {
      background: linear-gradient(135deg, #164d1a 0%, #20722c 100%);
      border: 4px solid #44aa44;
      border-radius: 20px;
      padding: 23px 23px 30px 23px;
      margin-bottom: 7px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.19), inset 0 0 14px rgba(68,170,68,0.09);
      position: relative;
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 620px; max-height: 880px; height: 740px;
      justify-content: flex-start;
    }
    #game-area {
      width: 100%;
      display: flex;
      flex-direction: row;
      gap: 40px;
      align-items: flex-start;
      justify-content: center;
      margin-bottom: 18px;
      min-height: 420px;
    }
    #mines-controls {
      min-width:235px; max-width:315px;
      display:flex; flex-direction:column; gap:12px;
      background: linear-gradient(135deg,rgba(255,215,0,0.08),rgba(0,0,0,0.02));
      border: 1.8px solid rgba(255,215,0,0.12);
      border-radius:11px; padding:16px 18px 13px 18px;
      font-size: 1.13em;
      align-self: flex-start;
    }
    #mines-controls label {
      color: #ffd700;
      font-weight: bold;
      font-size: 1em;
      margin-bottom: 2px;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #mines-controls input[type="number"], #mines-controls input[type="text"] {
      padding: 8px 12px;
      font-size: 1em;
      border: 2px solid rgba(255,215,0,0.23);
      border-radius: 6px;
      background: #181d23;
      color: #fff;
      font-weight: bold;
      width: 120px;
      margin-left: 8px;
    }
    #mines-controls select {
      padding: 8px 12px;
      font-size: 1em;
      border: 2px solid #ffd700;
      border-radius: 8px;
      background: #38495a;
      color: #fff;
      font-weight: bold;
      width: 80px;
      margin-left: 8px;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      box-shadow: none;
      outline: none;
    }
    #mines-controls select option {
      background: #38495a;
      color: #fff;
    }
    #mines-controls input:focus,
    #mines-controls select:focus {
      outline: none;
      border-color: #ffd700;
      background: rgba(255,215,0,0.16);
      box-shadow: 0 0 8px rgba(255,215,0,0.13);
    }
    #mines-controls button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-size: 1em;
      font-weight: bold;
      letter-spacing: 0.8px;
      background: linear-gradient(135deg, #ffed4e 0%, #ffd700 100%);
      color: #181818;
      margin-top: 2px;
      cursor: pointer;
      transition: filter .2s, box-shadow .2s;
      min-width: 85px;
    }
    #mines-controls button:active { filter: brightness(0.96);}
    #cashout { background: linear-gradient(135deg, #00d960 0%, #00b84d 100%); color: #fff; }
    #cashout:hover { background: linear-gradient(135deg,#00ff6b 0%,#00d960 100%);}
    #start:hover { box-shadow: 0 4px 16px rgba(255,239,78,0.16);}
    #cancel { background: linear-gradient(135deg, #d90036 0%, #8b1527 100%); color: #fff; }
    .muted { color: #9aa4b2; font-size: 1.11em;}
    #grid {
      display: grid;
      grid-template-columns: repeat(5, 64px);
      grid-gap: 12px;
      background: none;
      margin-top: 10px;
    }
    #grid button.reel {
      width: 64px; height: 64px; font-size: 28px; font-weight: bold;
      border: 2px solid #14ecb3;
      border-radius: 11px;
      background: linear-gradient(135deg, #101c16 72%, #205542);
      color: #90f6e7;
      cursor: pointer;
      box-shadow: 0 4px 14px #2029245a;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    #grid button.reel.safe {
      background: linear-gradient(135deg, #1ad879 72%, #20a754 100%);
      color: #fff;
      box-shadow: 0 0 0 rgba(0,0,0,0);
      border: 2px solid #7ef292;
    }
    #grid button.reel.lost {
      background: linear-gradient(135deg, #d90036 72%, #99151e 100%);
      color: #fff;
      box-shadow: 0 0 0 rgba(0,0,0,0);
      border: 2px solid #ffbaba;
    }
    #mines-log {
      margin-top:22px;
      font-size:1.13em;
      width:100%;
      text-align:center;
    }
    footer { margin-top:13px; text-align:center; color:#9aa4b2; }
    @media (max-width: 900px) {.left-sidebar {display:none !important;}}
    @media (max-width: 700px) {#mines-controls{max-width:100vw;}}
  </style>
</head>
<body>
  <div class="left-sidebar">
    <div class="sidebar-balance">
      <p>💰 Balance</p>
      <div class="amount" id="sidebar-bankroll">$0</div>
    </div>
    <div class="sidebar-last-mult" id="sidebar-last-mult">
      <div style="font-size:0.93em;font-weight:bold;">💣 Last Mult</div>
      <div style="font-size:1.15em;margin-top:2px;" id="sidebar-last-mult-txt">-</div>
    </div>
    <div class="sidebar-result" id="sidebar-result">
      <div class="sidebar-result-text" id="sidebar-result-text">Result</div>
      <div class="sidebar-result-amount" id="sidebar-result-amount">$0</div>
    </div>
  </div>
  <div id="mines-container">
    <span id="bankroll" style="display:none"></span>
    <div class="header-bar">
      <h1>💣 MINES</h1>
      <a href="../../index.html" class="back-link">← Back</a>
    </div>
    <div class="table">
      <section id="game-area">
        <div>
          <p class="muted" style="margin-bottom:7px;">Configure round and control your play.</p>
          <div id="mines-controls">
            <label>Bet Amount: <input id="bet" type="number" min="1" value="10"></label>
            <label>Mine Count:
              <select id="mine-count">
                <!-- options dynamically filled -->
              </select>
            </label>
            <label>Client Seed: <input id="client-seed" type="text" placeholder="optional"/></label>
            <div style="display:flex;gap:8px">
              <button id="start">Start Round</button>
              <button id="cashout" disabled>Cash Out</button>
              <button id="cancel" disabled>Cancel</button>
            </div>
            <div>
              <div><strong>Multiplier:</strong> <span id="multiplier">1.00x</span></div>
              <div><strong>Potential Payout:</strong> <span id="payout">$0.00</span></div>
            </div>
            <div style="margin-top:6px;font-size:13px;color:var(--muted)">
              <div>Server seed hash: <span id="server-hash" style="display:inline-block;max-width:260px;word-break:break-all;overflow-wrap:break-word;vertical-align:middle">-</span></div>
              <div>Server seed (revealed after round): <span id="server-seed">-</span></div>
            </div>
          </div>
        </div>

        <div style="margin-top:10px;">
          <div id="grid"></div>
        </div>
      </section>
      <div id="mines-log"></div>
    </div>
    <footer><small>Prototype — game logic will be implemented on request.</small></footer>
  </div>
  <script>
    // Sidebar sync logic for mines game.
    function syncSidebar() {
      var bankroll = document.getElementById('bankroll')?.textContent || '$0';
      document.getElementById('sidebar-bankroll').textContent = bankroll;

      // Last Multiplier
      var minesLogEl = document.getElementById('mines-log');
      var lastMult = '-';
      if(minesLogEl && minesLogEl.textContent.match(/Multiplier: ([\d.]+)x/) ) {
        lastMult = minesLogEl.textContent.match(/Multiplier: ([\d.]+)x/)[1] + 'x';
      }
      if(minesLogEl && minesLogEl.textContent.match(/Cashed out:.*\(x([\d.]+)\)/)) {
        lastMult = minesLogEl.textContent.match(/Cashed out:.*\(x([\d.]+)\)/)[1] + 'x';
      }
      if(minesLogEl && minesLogEl.textContent.match(/You won.*\(([\d.]+)x\)/)) {
        lastMult = minesLogEl.textContent.match(/You won.*\(([\d.]+)x\)/)[1] + 'x';
      }
      document.getElementById('sidebar-last-mult-txt').textContent = lastMult;

      // Result/dollars
      var res = "-";
      if(minesLogEl && minesLogEl.textContent.match(/Cashed out:\s*\$?([\d.]+)\s*\(x[\d.]+\)/)){
        res = "$" + minesLogEl.textContent.match(/Cashed out:\s*\$?([\d.]+)\s*\(x[\d.]+\)/)[1];
      } else if(minesLogEl && minesLogEl.textContent.match(/lost bet of\s*\$?([\d.]+)/)){
        res = "-" + minesLogEl.textContent.match(/lost bet of\s*\$?([\d.]+)/)[1];
      } else if(minesLogEl && minesLogEl.textContent.match(/You won\s*\$?([\d.]+)/)){
        res = "$" + minesLogEl.textContent.match(/You won\s*\$?([\d.]+)/)[1];
      }
      document.getElementById('sidebar-result-amount').textContent = res === "-" ? "-" : res;
      document.getElementById('sidebar-result-text').textContent = res === "-" ? "RESULT" : (res.startsWith('-') ? "LOSE" : "WIN!");
      var box = document.getElementById('sidebar-result');
      box.className = "sidebar-result" +
        ((res !== "-" && !res.startsWith('-') && res!=="0" && res!=="$0") ? " win" 
        : (res.startsWith('-') ? " lose" : ""));
    }
    setInterval(syncSidebar, 200);
  </script>
  <script src="main.js"></script>
</body>
</html>
